<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AeroTune</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #081020; color: #edf4ff; }
    main { max-width: 1100px; margin: 0 auto; padding: 28px; }
    .card { background: #111b33; border: 1px solid #26395f; border-radius: 18px; padding: 20px; margin: 16px 0; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    label { display: block; margin: 12px 0 6px; color: #bfd0ff; }
    input, select, button { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 10px; border: 1px solid #324a7a; background: #0b1428; color: #edf4ff; }
    button { margin-top: 16px; background: #4b7cff; border: 0; font-weight: 700; cursor: pointer; }
    .axis { background: #0b1428; border: 1px solid #26395f; border-radius: 16px; padding: 16px; }
    .badge { display: inline-block; border-radius: 999px; padding: 5px 10px; background: #26395f; color: #cfe0ff; font-size: 13px; }
    .warn { color: #ffd38a; }
    .move { font-weight: 700; font-size: 17px; }
    .clean { color: #a9ffca; font-weight: 700; }
    pre { white-space: pre-wrap; background: #050914; border-radius: 12px; padding: 14px; overflow: auto; }
    @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<main>
  <h1>⚡ AeroTune</h1>
  <p>Betaflight-style FPV PID advice with simple feel-based recommendations.</p>

  <section class="card">
    <h2>Upload & Tune Goal</h2>
    <form id="uploadForm">
      <label>CSV Log File</label>
      <input id="file" name="file" type="file" accept=".csv" required />

      <label>Drone Size</label>
      <select id="drone_size" name="drone_size">
        <option value="7" selected>7 inch</option>
        <option value="5">5 inch</option>
      </select>

      <label>Tune Goal</label>
      <select id="tuning_goal" name="tuning_goal">
        <option value="efficient" selected>Efficient / Smooth</option>
        <option value="locked_in">Locked-In / Responsive</option>
        <option value="floaty">Floaty / Cinematic</option>
      </select>

      <button type="submit">Analyze Log</button>
    </form>
  </section>

  <section class="card">
    <h2>Summary</h2>
    <div id="summary">Waiting for upload.</div>
  </section>

  <section class="card">
    <h2>Pilot Tune Notes</h2>
    <div id="axes" class="grid"></div>
  </section>

  <section class="card">
    <h2>Copyable Pilot Notes</h2>
    <pre id="copyNotes">No analysis yet.</pre>
  </section>

  <section class="card">
    <h2>Machine Output</h2>
    <pre id="raw">No analysis yet.</pre>
  </section>
</main>

<script>
const form = document.getElementById("uploadForm");
const summary = document.getElementById("summary");
const axes = document.getElementById("axes");
const raw = document.getElementById("raw");
const copyNotes = document.getElementById("copyNotes");

function percentMove(value) {
  const n = Number(value || 0) * 100;
  if (Math.abs(n) < 0.05) return "";
  return `${n > 0 ? "+" : ""}${n.toFixed(1)}%`;
}

function deltaText(delta) {
  const parts = [];
  const p = percentMove(delta?.p);
  const i = percentMove(delta?.i);
  const d = percentMove(delta?.d);
  const ff = percentMove(delta?.ff);

  if (p) parts.push(`P ${p}`);
  if (i) parts.push(`I ${i}`);
  if (d) parts.push(`D ${d}`);
  if (ff) parts.push(`FF ${ff}`);

  return parts.length ? parts.join(" / ") : "No PID change";
}

function render(data) {
  const analysis = data.analysis;

  summary.innerHTML = `
    <p><strong>${analysis.summary}</strong></p>
    <p>Goal: ${analysis.tuning_goal || "efficient"} | Drone: ${analysis.drone_size}" | Log: ${analysis.duration_s}s @ ${analysis.sample_rate_hz}Hz</p>
    ${(analysis.global_actions || []).map(a => `<p>• ${a}</p>`).join("")}
    ${(analysis.warnings || []).map(w => `<p class="warn">⚠️ ${w}</p>`).join("")}
  `;

  axes.innerHTML = "";
  const notes = [];

  for (const axisName of ["roll", "pitch", "yaw"]) {
    const axis = analysis.axes?.[axisName];
    if (!axis) continue;

    const moves = deltaText(axis.pid_delta_pct);
    const isClean = axis.issue === "clean_tune";

    notes.push(`[${axis.axis_name}]`);
    notes.push(`Outcome: ${axis.feel}`);
    notes.push(`Change: ${moves}`);
    notes.push(axis.recommendation_text);
    for (const move of axis.tuning_moves || []) notes.push(`- ${move}`);
    notes.push(`Confidence: ${axis.confidence}`);
    if (axis.confidence_reason) notes.push(`Reason: ${axis.confidence_reason}`);
    notes.push("");

    const div = document.createElement("div");
    div.className = "axis";
    div.innerHTML = `
      <span class="badge">${axis.axis_name}</span>
      <h3 class="${isClean ? "clean" : ""}">${axis.feel}</h3>
      ${axis.propwash_detected ? `<p class="warn"><strong>Propwash detected</strong></p>` : ""}
      <p class="move">${moves}</p>
      <p>${axis.recommendation_text}</p>
      <p><strong>What to try:</strong></p>
      <ul>${(axis.tuning_moves || []).map(m => `<li>${m}</li>`).join("")}</ul>
      <p><strong>Confidence:</strong> ${axis.confidence}</p>
      ${axis.confidence_reason ? `<p><strong>Reason:</strong> ${axis.confidence_reason}</p>` : ""}
    `;

    axes.appendChild(div);
  }

  copyNotes.textContent = notes.join("\n");
  raw.textContent = JSON.stringify(analysis, null, 2);
}

form.addEventListener("submit", async (event) => {
  event.preventDefault();

  summary.textContent = "Analyzing...";
  axes.innerHTML = "";
  raw.textContent = "";
  copyNotes.textContent = "";

  const formData = new FormData();
  formData.append("file", document.getElementById("file").files[0]);
  formData.append("drone_size", document.getElementById("drone_size").value);
  formData.append("tuning_goal", document.getElementById("tuning_goal").value);

  const response = await fetch("/upload-log", { method: "POST", body: formData });
  const data = await response.json();

  if (!response.ok) {
    summary.innerHTML = `<p class="warn">${data.error || "Upload failed."}</p>`;
    raw.textContent = JSON.stringify(data, null, 2);
    return;
  }

  render(data);
});
</script>
</body>
</html>
